{% if media_item.tmdb_page_url %}
<a href="{{ media_item.tmdb_page_url }}" class="poster-tmdb-link block w-full shrink-0" target="_blank" rel="noopener noreferrer" aria-label="Ver «{{ media_item.title }}» en The Movie Database (se abre en una pestaña nueva)">
{% endif %}
<div class="poster-frame border border-solid border-[var(--color-concrete)] bg-[var(--color-beige)]">
    {% if media_item.poster_url %}
        <img src="{{ media_item.poster_url }}" alt="" class="poster-image" loading="lazy" decoding="async" data-poster-image>
        <div class="poster-fallback-placeholder" data-poster-fallback aria-hidden="true">
            <i class="fa-regular fa-image text-lg text-slate-400" aria-hidden="true"></i>
        </div>
    {% else %}
        <div class="poster-fallback-placeholder poster-fallback--visible" data-poster-fallback>
            <i class="fa-regular fa-image text-lg text-slate-400" aria-hidden="true"></i>
        </div>
    {% endif %}
</div>
{% if media_item.tmdb_page_url %}
</a>
{% endif %}
